dependencies:
  tools:
    - type: "mcp"
      value: "list_issues"
      description: "List Linear issues filtered by team, project, label, assignee, status"
      transport: "streamable_http"
      url: "https://mcp.linear.app/mcp"
    - type: "mcp"
      value: "get_issue"
      description: "Fetch a single Linear issue by ID"
      transport: "streamable_http"
      url: "https://mcp.linear.app/mcp"
    - type: "mcp"
      value: "update_issue"
      description: "Update a Linear issue status"
      transport: "streamable_http"
      url: "https://mcp.linear.app/mcp"
    - type: "mcp"
      value: "create_comment"
      description: "Add a comment to a Linear issue"
      transport: "streamable_http"
      url: "https://mcp.linear.app/mcp"
